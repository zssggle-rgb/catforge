name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --extra dev python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/factory-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/factory-web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

