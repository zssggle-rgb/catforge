services:
  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    restart: unless-stopped
    mem_limit: ${CATFORGE_API_MEM_LIMIT:-3g}
    memswap_limit: ${CATFORGE_API_MEMSWAP_LIMIT:-3g}
    env_file:
      - ${CATFORGE_CONTAINER_ENV_FILE:-.env}
    environment:
      CATFORGE_DATABASE_URL: ${CATFORGE_DATABASE_URL:?CATFORGE_DATABASE_URL is required}
      CATFORGE_REDIS_URL: ${CATFORGE_REDIS_URL:-redis://redis:6379/0}
      CATFORGE_UPLOAD_DIR: ${CATFORGE_UPLOAD_DIR:-/data/uploads}
      CATFORGE_EXPORT_DIR: ${CATFORGE_EXPORT_DIR:-/data/exports}
      CATFORGE_SYNC_JOBS: ${CATFORGE_SYNC_JOBS:-true}
      CATFORGE_SLOW_REQUEST_SECONDS: ${CATFORGE_SLOW_REQUEST_SECONDS:-2.0}
      CATFORGE_ANALYST_REPORT_PUBLISHER: ${CATFORGE_ANALYST_REPORT_PUBLISHER:-}
      CATFORGE_FEISHU_CLI_BIN: ${CATFORGE_FEISHU_CLI_BIN:-}
      CATFORGE_FEISHU_AS: ${CATFORGE_FEISHU_AS:-bot}
      CATFORGE_FEISHU_CONFIG_DIR: ${CATFORGE_FEISHU_CONFIG_DIR:-}
      CATFORGE_FEISHU_DATA_DIR: ${CATFORGE_FEISHU_DATA_DIR:-}
      CATFORGE_FEISHU_LINK_SHARE_ENTITY: ${CATFORGE_FEISHU_LINK_SHARE_ENTITY:-}
      CATFORGE_FEISHU_EXTERNAL_ACCESS: ${CATFORGE_FEISHU_EXTERNAL_ACCESS:-true}
      CATFORGE_FEISHU_SECURITY_ENTITY: ${CATFORGE_FEISHU_SECURITY_ENTITY:-anyone_can_view}
      CATFORGE_FEISHU_COMMENT_ENTITY: ${CATFORGE_FEISHU_COMMENT_ENTITY:-anyone_can_view}
      CATFORGE_FEISHU_SHARE_ENTITY: ${CATFORGE_FEISHU_SHARE_ENTITY:-only_full_access}
      CATFORGE_FEISHU_INVITE_EXTERNAL: ${CATFORGE_FEISHU_INVITE_EXTERNAL:-true}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      PATH: ${CATFORGE_API_PATH:-/opt/openclaw-node/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${CATFORGE_API_PORT:-8000}:8000"
    volumes:
      - catforge_data:/data
      - ${CATFORGE_FEISHU_NODE_DIR:-/opt/catforge/.empty-feishu-node}:/opt/openclaw-node:ro
      - ${CATFORGE_FEISHU_CONFIG_DIR:-/opt/catforge/.empty-lark-cli}:/root/.lark-cli:ro
      - ${CATFORGE_FEISHU_DATA_DIR:-/opt/catforge/.empty-lark-cli-data}:/root/.local/share/lark-cli:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: apps/factory-web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${CATFORGE_CONTAINER_ENV_FILE:-.env}
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://api:8000}
    ports:
      - "${CATFORGE_WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  catforge_data:
  redis_data:
